<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <!-- CSS -->
        <link href="bootstrap.min.css" rel="stylesheet">
        <link href="stylesheet.css" rel="stylesheet">
        <script src="bootstrap.bundle.min.js"></script>
        <title>VaultTube</title>
    </head>
    <body>
        <!-- Javascript -->
        <script src="jquery.min.js"></script>
        <div class="container-lg py-4">
            <nav class="navbar navbar-expand-lg navbar-light bg-light rounded shadow-sm mb-4">
                <div class="container-fluid">
                  <a class="navbar-brand fw-bold fs-4" href="/">VaultTube</a>
                  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                  </button>
                  <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 fs-6">
                      <li class="nav-item">
                        <a class="nav-link px-3" href="/download.html">Download</a>
                      </li>
                      <li class="nav-item">
                        <a class="nav-link px-3" href="/channels.html">Channels</a>
                      </li>
                      <li class="nav-item">
                        <a class="nav-link px-3" href="/playlists.html">Playlists</a>
                      </li>
                      <li class="nav-item">
                        <a class="nav-link px-3" href="/stats.html">Stats</a>
                      </li>
                      <li class="nav-item">
                        <a class="nav-link px-3" href="/random.html">Random</a>
                      </li>
                      <li class="nav-item">
                        <a class="nav-link px-3" href="/upload.html">Upload</a>
                      </li>
                    </ul>

                    <div class="form-check form-switch d-flex align-items-center ms-3">
                      <input class="form-check-input" type="checkbox" id="darkModeToggle" aria-label="Toggle dark mode" />
                      <label class="form-check-label ms-2 text-nowrap" for="darkModeToggle">Dark Mode</label>
                    </div>

                    <form class="d-flex ms-3" onsubmit="do_search(); return false;">
                      <input class="form-control me-2 rounded-pill border-2" type="search" placeholder="Search" aria-label="Search" id="searchtext">
                      <button class="btn btn-outline-primary rounded-pill px-4" type="button" onclick="do_search();">Search</button>
                    </form>
                  </div>
                </div>
            </nav>
<div class="app-container">
  <!-- Server URL Configuration Modal -->
  <div id="serverConfigModal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Server Configuration</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="serverUrlInput" class="form-label">Server URL</label>
            <input type="text" class="form-control" id="serverUrlInput" value="http://localhost:5000">
          </div>
          <div class="alert alert-info">
            <small>Enter your Flask server URL. Default is http://localhost:5000</small>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="saveServerUrl">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3">VaultTube</h1>
    <div>
      <button class="btn btn-outline-secondary btn-sm" id="configBtn">⚙️ Settings</button>
      <button class="btn btn-outline-secondary btn-sm" id="openFolderBtn">📁 Vault Folder</button>
    </div>
  </div>

  <!-- Resume Section -->
  <div class="mb-5">
    <h5 id="resumelabel">Resume</h5>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="resumedeck"></div>
  </div>

  <!-- Main Content -->
  <div class="mb-4">
    <div class="row mb-3 align-items-center">
      <div class="col"><h5 id="latestlabel">Latest</h5></div>
      <div class="col-auto">
        <div class="d-flex align-items-center">
          <span class="form-text me-2">Unwatched</span>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" id="contentToggle" onclick="contentChange();" aria-label="Toggle content filter">
            <label class="form-check-label" for="contentToggle"></label>
          </div>
          <span class="form-text ms-2">All</span>
        </div>
      </div>
      <div class="col-auto">
        <div class="d-flex align-items-center">
          <span class="form-text me-2">Published</span>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" id="dateToggle" onclick="contentChange();" aria-label="Toggle date filter">
            <label class="form-check-label" for="dateToggle"></label>
          </div>
          <span class="form-text ms-2">Added</span>
        </div>
      </div>
    </div>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="carddeck"></div>
  </div>

  <!-- Pagination -->
  <nav aria-label="Page navigation example" class="pt-4 pb-4 d-flex justify-content-center">
    <ul id="pagelist" class="pagination" style="gap: 0.5rem;"></ul>
  </nav>
</div>

<script src="scripts.js"></script>
<script>
  // Initialize server URL from electronAPI
  let serverUrl = 'http://localhost:5000';
  
  // Wait for electronAPI to be available
  function initServerUrl() {
    if (window.electronAPI && window.electronAPI.getServerUrl) {
      window.electronAPI.getServerUrl().then(url => {
        if (url) serverUrl = url;
      });
    }
  }
  
  // Server configuration
  document.getElementById('configBtn').addEventListener('click', () => {
    const modal = new bootstrap.Modal(document.getElementById('serverConfigModal'));
    document.getElementById('serverUrlInput').value = serverUrl;
    modal.show();
  });

  document.getElementById('saveServerUrl').addEventListener('click', () => {
    const newUrl = document.getElementById('serverUrlInput').value;
    if (newUrl) {
      serverUrl = newUrl;
      if (window.electronAPI && window.electronAPI.setServerUrl) {
        window.electronAPI.setServerUrl(newUrl);
      }
      bootstrap.Modal.getInstance(document.getElementById('serverConfigModal')).hide();
      update(1);
    }
  });

  // Folder operations
  document.getElementById('openFolderBtn').addEventListener('click', async () => {
    const result = await window.electronAPI.openFolder();
    if (result.success) {
      alert('Vault folder set to: ' + result.path);
    } else {
      alert('Error: ' + result.error);
    }
  });

  // Global variables
  let currentId = 1;
  let vPlayer = null;
  let tspoll = null;

  // Update function
  function update(id) {
    currentId = id;
    let totalCount = 0;
    
    const sortRelease = $('#dateToggle').prop('checked') ? 'AddedAt' : 'PublishedAt';
    
    if ($('#contentToggle').prop('checked')) {
      // All videos count
      $.get(`${serverUrl}/api/stats/video/count`, function(data) {
        totalCount = parseInt(data);
        const totalPages = Math.ceil(totalCount / 40);
        pagination(id, totalPages);
      });
      $.getJSON(`${serverUrl}/api/getvids/all/${sortRelease}/desc/${(id-1)*40}`, function(data) {
        processdata(data);
      });
    } else {
      // Unwatched videos count
      $.get(`${serverUrl}/api/stats/video/unwatched`, function(data) {
        totalCount = parseInt(data);
        const totalPages = Math.ceil(totalCount / 40);
        pagination(id, totalPages);
      });
      $.getJSON(`${serverUrl}/api/getvids/unwatched/${sortRelease}/desc/${(id-1)*40}`, function(data) {
        processdata(data);
      });
    }
  }

  // Process resume data
  function processresume(data) {
    if (data.length > 0) {
      $('#resumelabel').text('Resume');
      $('#resumedeck').empty();
      $.each(data, function(i, item) {
        var jobj = jQuery.parseJSON(data[i]['json']);
        var txt = `<div class="col"><div class="card h-100" onclick="playvid('${data[i].id}')" role="button" tabindex="0" aria-label="Play video: ${data[i].title}"><img src="${serverUrl}/api/images/${data[i].id}" class="card-img-top img-fluid" alt="Thumbnail">`;
        
        // Progress Bar Math
        var s = data[i]['length'].split(":");
        var total = (+s[0]) * 60 * 60 + (+s[1]) * 60 + (+s[2]);
        var current = parseInt(data[i]['timestamp']);
        var p = parseInt((current / total) * 100);
        
        txt += `<div class="progress"><div class="progress-bar progress-bar-striped bg-info" role="progressbar" style="width: ${p}%" aria-valuenow="${p}" aria-valuemax="100"></div></div>`;
        txt += `<div class="card-body"><h5 class="card-title">${data[i].title}</h5>`;
        txt += `<p><a href='${serverUrl}/creator.html?creator=${data[i]['channelId']}'>${data[i]['youtuber']}</a></p>`;
        txt += `</div><div class="card-footer"><small class="text-muted">Published: ${data[i].PublishedAt}</small></div></div></div>`;
        $('#resumedeck').append(txt);
      });
    }
  }

  // Process data
  function processdata(data) {
    $('#carddeck').empty();
    if (data.length === 0) {
      $('#carddeck').append('<div class="col-12"><div class="alert alert-info">No videos found</div></div>');
      return;
    }
    
    $.each(data, function(i, item) {
      var jobj = jQuery.parseJSON(data[i]['json']);
      var txt = `<div class="col"><div class="card h-100" onclick="playvid('${data[i].id}')" role="button" tabindex="0" aria-label="Play video: ${data[i].title}"><img src="${serverUrl}/api/images/${data[i].id}" class="card-img-top img-fluid" alt="Thumbnail">`;
      
      if (data[i]['watched'] == 1) {
        txt += `<div class="card-body"><h5 class="card-title">${data[i].title}</h5>`;
        txt += `<p><a href='${serverUrl}/creator.html?creator=${data[i]['channelId']}'>${data[i]['youtuber']}</a></p>`;
        txt += `</div><div class="card-footer"><small class="text-muted">Published: ${data[i].PublishedAt}</small></div></div></div>`;
      } else {
        txt += `<div class="card-body"><h5 class="card-title">${data[i].title}</h5>`;
        txt += `<p><a href='${serverUrl}/creator.html?creator=${data[i]['channelId']}'>${data[i]['youtuber']}</a></p>`;
        txt += `</div><div class="card-footer"><small class="text-muted">Published: ${data[i].PublishedAt}</small></div></div></div>`;
      }
      $('#carddeck').append(txt);
    });
  }

  // Pagination function
  function pagination(current, total) {
    $('#pagelist').empty();
    if (total <= 1) return;
    
    for (let i = 1; i <= total; i++) {
      let activeClass = i === current ? 'active' : '';
      let disabledClass = i === 1 ? 'disabled' : '';
      let disabledClassNext = i === total ? 'disabled' : '';
      
      let html = `<li class="page-item ${activeClass}">
        <a class="page-link" href="#" onclick="update(${i}); return false;">${i}</a>
      </li>`;
      $('#pagelist').append(html);
    }
  }

  // Play video function - navigate to player.html
  function playvid(id) {
    window.location.href = `${serverUrl}/player.html?id=${id}`;
  }

  // Watch status function
  function watch_status(id) {
    $.getJSON(`${serverUrl}/api/watch_status/${id}`, function(data) {
      const status = data === "1" ? "✅ Watched" : "⏳ Unwatched";
      $("#watchstatus").html(`<span class="badge ${data === "1" ? 'bg-success' : 'bg-warning'}">${status}</span>`);
    });
  }

  // Content change function
  function contentChange() {
    update(currentId);
  }

  // Initialize on document ready
  $(document).ready(function() {
    initServerUrl();
    update(1);
    $.getJSON(`${serverUrl}/api/list/resume/`, function(data) {
      processresume(data);
    });
  });
</script>
       </div>
        <hr class="my-4">
        <footer id="footer" class="py-3 bg-light shadow-sm mt-auto">
            <div class="container text-center">
                <p class="mb-0 fst-italic text-secondary">VaultTube v1.0.0-alpha &nbsp;
                  |&nbsp; <a href="https://github.com/jedihomelab/VaultTube" target="_blank" class="link-secondary"><img src="github.svg" height="20" width="20" alt="GitHub" /></a>
                  &nbsp;|&nbsp; <a href="https://hub.docker.com/repository/docker/dyslexicjedi/vaulttube/general" target="_blank" class="link-secondary"><img src="package.svg" height="20" width="20" alt="Docker" /></a>
                </p>
            </div>
        </footer>
        <script>
          function do_search(){
            var searchterm = $("#searchtext").val();
            window.location.href='/search.html?txt='+encodeURIComponent(searchterm);
          }
        </script>
        <script>
          function enableDarkMode(enabled) {
            if(enabled) {
              document.documentElement.classList.add('dark-mode');
              $('#darkModeToggle').prop('checked', true);
            } else {
              document.documentElement.classList.remove('dark-mode');
              $('#darkModeToggle').prop('checked', false);
            }
          }

          $(document).ready(function() {
            // On load, check saved preference
            let darkModePref = localStorage.getItem('darkModeEnabled') === 'true';
            enableDarkMode(darkModePref);

            $('#darkModeToggle').change(function() {
              let enabled = $(this).prop('checked');
              enableDarkMode(enabled);
              localStorage.setItem('darkModeEnabled', enabled);
            });
          });
        </script>
    </body>
</html>
