name: Build Electron App
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '28.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Electron App
        run: npx electron-builder build --universal --publish never
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-app
          path: dist/mas-universal/*.app