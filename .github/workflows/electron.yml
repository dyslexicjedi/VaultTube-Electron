name: Build Electron App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Electron App (Test)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: npx electron-builder build --universal --publish never -c.mac.identity=null
      
      - name: Build and Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder build --mac --x64 --arm64 --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Artifacts (for non-tag builds)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: electron-app
          path: dist/mas-universal/*.app