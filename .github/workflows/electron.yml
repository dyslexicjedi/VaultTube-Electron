name: Build Electron App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macOS-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Electron App (Test)
        if: (github.event_name == 'push' || github.event_name == 'pull_request') && !startsWith(github.ref, 'refs/tags/')
        run: npx electron-builder build --mac --x64 --arm64 --publish never -c.mac.identity=null
      
      - name: Build and Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder build --mac --x64 --arm64 --publish always -c.mac.identity=null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: List Build Output (Debug)
        run: |
          echo "=== Build Output ==="
          ls -la dist/ 2>/dev/null || echo "No dist directory"
          ls -la dist/*.dmg 2>/dev/null || echo "No DMG files"
          ls -la dist/*.zip 2>/dev/null || echo "No ZIP files"
      
      - name: Upload Artifacts (for non-tag builds)
        if: (github.event_name == 'push' || github.event_name == 'pull_request') && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: electron-app-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/mas-universal/*.app
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Electron App (Test)
        if: (github.event_name == 'push' || github.event_name == 'pull_request') && !startsWith(github.ref, 'refs/tags/')
        run: npx electron-builder build --x64 --arm64 --linux --publish never
      
      - name: Build and Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder build --x64 --arm64 --linux --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: List Build Output (Debug)
        run: |
          echo "=== Build Output ==="
          ls -la dist/ 2>/dev/null || echo "No dist directory"
          ls -la dist/*.AppImage 2>/dev/null || echo "No AppImage files"
          ls -la dist/*.deb 2>/dev/null || echo "No deb files"
          ls -la dist/*.rpm 2>/dev/null || echo "No rpm files"
      
      - name: Upload Artifacts (for non-tag builds)
        if: (github.event_name == 'push' || github.event_name == 'pull_request') && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: electron-app-linux
          path: |
            dist/*.rpm
            dist/*.AppImage
            dist/*.deb